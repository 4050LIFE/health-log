<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0D1A">
<title>♥ ヘルスログ</title>
<style>
:root{--bg:#0D0D1A;--card:#12122240;--cs:#1A1A2E;--red:#E8475F;--blue:#5B8DEF;--green:#4ADE80;--yellow:#FBBF24;--orange:#FB923C;--danger:#EF4444;--purple:#A78BFA;--teal:#2DD4BF;--text:#fff;--muted:#888;--dim:#555}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Hiragino Sans',sans-serif;max-width:420px;margin:0 auto;min-height:100dvh;overflow-x:hidden;padding-bottom:80px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit}

.hd{padding:20px 20px 12px;display:flex;align-items:center;justify-content:space-between}
.hd h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
.hd .dt{color:var(--muted);font-size:12px}

.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 20px}
.ab{border-radius:20px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:transform .12s}
.ab:active{transform:scale(.93)}
.ab .l{font-size:12px;font-weight:700}
.ab .s{color:#666;font-size:9px}
.ab-h{background:linear-gradient(145deg,#2A1525,#1A1A2E);box-shadow:0 0 30px rgba(232,71,95,.1)}
.ab-n{background:linear-gradient(145deg,#1A1530,#1A1A2E);box-shadow:0 0 30px rgba(167,139,250,.1)}
.ab-ni{background:linear-gradient(145deg,#152525,#1A1A2E);box-shadow:0 0 30px rgba(45,212,191,.1)}

.st{font-size:14px;font-weight:700;color:#aaa;margin:16px 20px 10px}
.li{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--card);border-radius:14px;margin:0 20px 5px;cursor:pointer;transition:background .15s}
.li:active{background:#1E1E3A}
.li .ic{width:26px;display:flex;justify-content:center;flex-shrink:0}
.li .bd{flex:1;min-width:0}
.li .nm{font-size:13px;font-weight:600}
.li .mt{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.li .tm{color:var(--muted);font-size:12px;flex-shrink:0}
.li .ed{color:#444;font-size:14px;flex-shrink:0;padding:0 2px}
.empty{color:var(--dim);font-size:13px;text-align:center;padding:24px}

.sts{margin:16px 20px 0;padding:14px;background:var(--card);border-radius:18px;display:flex;justify-content:space-around}
.sn{font-size:24px;font-weight:800}.sl{font-size:9px;color:var(--muted)}.sd{width:1px;background:#222}

.bn{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:#0D0D1AEE;border-top:1px solid #1A1A2E;display:flex;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:50}
.nb{flex:1;padding:12px 0 10px;display:flex;flex-direction:column;align-items:center;gap:2px;opacity:.4;transition:opacity .2s}
.nb.on{opacity:1}
.nb .ni{font-size:20px}.nb .nl{font-size:10px;color:#fff;font-weight:600}

.cn{display:flex;align-items:center;justify-content:space-between;margin:16px 20px 14px}
.cn button{color:#aaa;font-size:24px;padding:4px 14px}
.cn .mo{font-size:17px;font-weight:700}
.cw{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin:0 16px 6px}
.cw span{text-align:center;font-size:11px;color:#777;padding:6px 0}
.cw span:first-child{color:var(--red)}.cw span:last-child{color:var(--blue)}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin:0 16px}
.cc{aspect-ratio:1;border-radius:12px;border:1px solid #222;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:2px}
.cc.has{background:#1E1E3A}.cc.tod{border:2px solid var(--blue)}
.cc .d{font-size:13px;color:#ccc}
.cc.tod .d{color:var(--blue);font-weight:700}
.cc .dots{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center}
.cc .dot{width:5px;height:5px;border-radius:50%}
.cc .cnt{position:absolute;top:1px;right:3px;font-size:8px;color:#888}
.cs{margin:18px 16px;padding:14px;background:var(--card);border-radius:16px;display:flex;justify-content:space-around}
.cs .sn{font-size:20px}

.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.ov.bot{align-items:flex-end}
.ov.show{display:flex}
.md{background:var(--cs);border-radius:24px;padding:24px 22px;width:min(90vw,360px);box-shadow:0 20px 60px rgba(0,0,0,.5);animation:su .25s ease-out;max-height:85vh;overflow-y:auto}
.md.sh{border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-width:420px;max-height:75vh;overflow-y:auto}
@keyframes su{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.mt2{color:#fff;font-size:15px;font-weight:600;text-align:center;margin-bottom:12px}

.f{margin:12px 0}.fl{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:500}
.dr{display:flex;gap:8px;align-items:center}
.di{flex:1;background:#0D0D1A;border:1px solid #333;border-radius:10px;color:#fff;padding:10px 12px;font-size:14px;-webkit-appearance:none}
.di:focus{outline:none;border-color:var(--blue)}
.bnw{padding:10px 14px;border-radius:10px;background:#222;color:#aaa;font-size:11px;font-weight:600;white-space:nowrap}
.bnw:active{background:#333}

.pd{display:flex;align-items:center;justify-content:center;gap:4px;margin:12px 0}
.pn{font-size:42px;font-weight:800;line-height:1}
.pm{color:#888;font-size:14px;align-self:flex-end;margin-bottom:6px}
.pe{display:flex;justify-content:space-between;color:#666;font-size:11px;margin:4px 2px 0}

.cg2{display:flex;flex-wrap:wrap;gap:6px}
.ch{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;background:#222;color:#aaa;transition:all .15s}
.ch.on{background:var(--blue);color:#fff}
.ch:active{transform:scale(.95)}

textarea.me{width:100%;background:#0D0D1A;border:1px solid #333;border-radius:10px;color:#fff;padding:10px 12px;font-size:13px;resize:none;min-height:60px}
textarea.me:focus{outline:none;border-color:var(--blue)}
input.ni2{width:80px;background:#0D0D1A;border:1px solid #333;border-radius:10px;color:#fff;padding:10px 12px;font-size:14px;text-align:center}
input.ni2:focus{outline:none;border-color:var(--blue)}

.mb{display:flex;gap:10px;margin-top:18px}
.mb button{flex:1;padding:12px 0;border-radius:14px;font-size:14px;font-weight:600}
.bc{border:1px solid #333!important;color:#aaa}
.bo{color:#fff;font-weight:700!important}

.dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.dh span{font-size:18px;font-weight:700}
.dh button{color:#888;font-size:22px}
.di2{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--card);border-radius:14px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.di2:active{background:#1E1E3A}
.di2 .ic{width:26px;display:flex;justify-content:center;flex-shrink:0;padding-top:2px}
.di2 .inf{flex:1;min-width:0}
.di2 .inf .nm2{color:#fff;font-size:14px;font-weight:600}
.di2 .inf .tm2{color:var(--muted);font-size:12px;margin-left:8px}
.di2 .inf .ex{font-size:11px;color:#999;margin-top:3px;line-height:1.4}
.db{color:#555;font-size:16px;padding:4px 8px;flex-shrink:0}

.bk-area{margin:20px;padding:16px;background:var(--card);border-radius:18px}
.bk-area .bk-title{font-size:13px;font-weight:700;color:#aaa;margin-bottom:12px}
.bk-row{display:flex;gap:8px}
.bk-btn{flex:1;padding:12px;border-radius:14px;background:#222;text-align:center;transition:transform .12s}
.bk-btn:active{transform:scale(.95)}
.bk-btn .bki{font-size:20px}
.bk-btn .bkl{font-size:11px;color:#aaa;margin-top:4px;display:block}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#2A2A4A;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="hd">
  <div><h1><span style="color:var(--red)">♥</span> ヘルスログ</h1><p style="margin-top:2px;color:#666;font-size:11px">狭心症の記録</p></div>
  <div class="dt" id="hDate"></div>
</div>

<div id="tHome">
  <div class="ag">
    <button class="ab ab-h" onclick="openM('heart')">
      <svg width="38" height="38" viewBox="0 0 48 48"><path d="M24 42s-18-10.2-18-22.8C6 12.36 11.16 8 17.4 8c3.78 0 5.94 2.16 6.6 3.12C24.66 10.16 26.82 8 30.6 8 36.84 8 42 12.36 42 19.2 42 31.8 24 42 24 42z" fill="#E8475F"/></svg>
      <span class="l" style="color:var(--red)">胸の痛み</span>
    </button>
    <button class="ab ab-n" onclick="openM('numb')">
      <svg width="36" height="36" viewBox="0 0 40 40" fill="none"><path d="M20 4c-2 0-4 1-5 3l-7 14c-1 2 .5 4 2.5 4h3v8c0 2 1.5 3 3 3h7c1.5 0 3-1 3-3v-8h3c2 0 3.5-2 2.5-4L25 7c-1-2-3-3-5-3z" fill="#A78BFA" opacity=".9"/><path d="M16 18h8M16 22h6" stroke="#1A1A2E" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="l" style="color:var(--purple)">しびれ</span>
    </button>
    <button class="ab ab-ni" onclick="openM('nitro')">
      <svg width="36" height="36" viewBox="0 0 40 40" fill="none"><rect x="14" y="4" width="12" height="20" rx="3" fill="#2DD4BF"/><rect x="16" y="8" width="8" height="6" rx="1" fill="#1A1A2E" opacity=".3"/><path d="M17 24v6c0 3 2.5 6 3 6s3-3 3-6v-6" fill="#2DD4BF"/></svg>
      <span class="l" style="color:var(--teal)">ニトロ</span>
    </button>
  </div>
  <div class="st">今日の記録</div>
  <div id="todLog"></div>
  <div id="totSt"></div>
</div>

<div id="tCal" style="display:none">
  <div class="cn"><button onclick="pMo()">‹</button><span class="mo" id="cT"></span><button onclick="nMo()">›</button></div>
  <div class="cw"><span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span></div>
  <div class="cg" id="cG"></div>
  <div class="cs" id="cS"></div>
</div>

<div id="tBk" style="display:none">
  <div class="bk-area" style="margin-top:8px">
    <div class="bk-title">バックアップ</div>
    <div class="bk-row">
      <button class="bk-btn" onclick="dlCSV()"><span class="bki">📊</span><span class="bkl">CSVダウンロード</span></button>
      <button class="bk-btn" onclick="cpJSON()"><span class="bki">📋</span><span class="bkl">JSONコピー</span></button>
    </div>
    <div style="margin-top:16px">
      <div class="bk-title">復元</div>
      <div class="bk-row">
        <button class="bk-btn" onclick="$('jFile').click()"><span class="bki">📥</span><span class="bkl">JSONから復元</span></button>
      </div>
      <input type="file" id="jFile" accept=".json,application/json" style="display:none" onchange="restJSON(this)">
    </div>
    <p style="color:#555;font-size:10px;margin-top:14px;line-height:1.5">💡 CSVはスプレッドシートで開けます。JSONは全データのバックアップ＆復元用です。定期的に保存しておくと安心です。</p>
  </div>
</div>

<div class="bn">
  <button class="nb on" id="n1" onclick="sTab('home')"><span class="ni">🏠</span><span class="nl">ホーム</span></button>
  <button class="nb" id="n2" onclick="sTab('cal')"><span class="ni">📅</span><span class="nl">カレンダー</span></button>
  <button class="nb" id="n3" onclick="sTab('bk')"><span class="ni">💾</span><span class="nl">バックアップ</span></button>
</div>

<!-- HEART -->
<div class="ov" id="mH" onclick="closeM('heart')">
<div class="md" onclick="event.stopPropagation()">
  <p class="mt2" id="mHT">胸の痛みを記録</p>
  <div class="pd">
    <svg width="28" height="28" viewBox="0 0 48 48"><path d="M24 42s-18-10.2-18-22.8C6 12.36 11.16 8 17.4 8c3.78 0 5.94 2.16 6.6 3.12C24.66 10.16 26.82 8 30.6 8 36.84 8 42 12.36 42 19.2 42 31.8 24 42 24 42z" fill="#E8475F" id="pHI"/></svg>
    <span class="pn" id="pN">5</span><span class="pm">/10</span>
  </div>
  <input type="range" min="1" max="10" value="5" id="pS" oninput="uP()" style="accent-color:var(--yellow);width:100%">
  <div class="pe"><span>軽い</span><span>激しい</span></div>
  <div class="f"><div class="fl">持続時間（分）</div><input type="number" class="ni2" id="hDur" placeholder="—" min="0"></div>
  <div class="f"><div class="fl">きっかけ（複数OK）</div><div class="cg2" id="hTr"></div></div>
  <div class="f"><div class="fl">メモ</div><textarea class="me" id="hMe" placeholder="状況など…" rows="2"></textarea></div>
  <div class="f"><div class="fl">日時</div><div class="dr"><input type="datetime-local" class="di" id="hDT"><button class="bnw" onclick="sN('hDT')">現在</button></div></div>
  <div class="mb"><button class="bc" onclick="closeM('heart')">キャンセル</button><button class="bo" id="hOk" onclick="svH()">記録する</button></div>
</div></div>

<!-- NUMB -->
<div class="ov" id="mN" onclick="closeM('numb')">
<div class="md" onclick="event.stopPropagation()">
  <p class="mt2" id="mNT">腕のしびれを記録</p>
  <div style="text-align:center;margin:10px 0"><svg width="44" height="44" viewBox="0 0 40 40" fill="none"><path d="M20 4c-2 0-4 1-5 3l-7 14c-1 2 .5 4 2.5 4h3v8c0 2 1.5 3 3 3h7c1.5 0 3-1 3-3v-8h3c2 0 3.5-2 2.5-4L25 7c-1-2-3-3-5-3z" fill="#A78BFA" opacity=".9"/><path d="M16 18h8M16 22h6" stroke="#1A1A2E" stroke-width="1.5" stroke-linecap="round"/></svg></div>
  <div class="f"><div class="fl">部位</div><div class="cg2" id="nSd"></div></div>
  <div class="f"><div class="fl">強さ</div><div class="cg2" id="nSt"></div></div>
  <div class="f"><div class="fl">メモ</div><textarea class="me" id="nMe" placeholder="気づいたことなど…" rows="2"></textarea></div>
  <div class="f"><div class="fl">日時</div><div class="dr"><input type="datetime-local" class="di" id="nDT"><button class="bnw" onclick="sN('nDT')">現在</button></div></div>
  <div class="mb"><button class="bc" onclick="closeM('numb')">キャンセル</button><button class="bo" style="background:var(--purple)" onclick="svN()">記録する</button></div>
</div></div>

<!-- NITRO -->
<div class="ov" id="mNi" onclick="closeM('nitro')">
<div class="md" onclick="event.stopPropagation()">
  <p class="mt2" id="mNiT">ニトロ使用を記録</p>
  <div style="text-align:center;margin:10px 0"><svg width="44" height="44" viewBox="0 0 40 40" fill="none"><rect x="14" y="4" width="12" height="20" rx="3" fill="#2DD4BF"/><rect x="16" y="8" width="8" height="6" rx="1" fill="#1A1A2E" opacity=".3"/><path d="M17 24v6c0 3 2.5 6 3 6s3-3 3-6v-6" fill="#2DD4BF"/></svg></div>
  <div class="f"><div class="fl">使用回数</div><div class="cg2" id="niC"></div></div>
  <div class="f"><div class="fl">効果</div><div class="cg2" id="niE"></div></div>
  <div class="f"><div class="fl">メモ</div><textarea class="me" id="niMe" placeholder="効くまでの時間など…" rows="2"></textarea></div>
  <div class="f"><div class="fl">日時</div><div class="dr"><input type="datetime-local" class="di" id="niDT"><button class="bnw" onclick="sN('niDT')">現在</button></div></div>
  <div class="mb"><button class="bc" onclick="closeM('nitro')">キャンセル</button><button class="bo" style="background:var(--teal)" onclick="svNi()">記録する</button></div>
</div></div>

<!-- DAY DETAIL -->
<div class="ov bot" id="dayD" onclick="closeDD()">
<div class="md sh" onclick="event.stopPropagation()">
  <div class="dh"><span id="ddT"></span><button onclick="closeDD()">✕</button></div>
  <div id="ddL"></div>
</div></div>

<div class="toast" id="toast"></div>

<script>
let R=JSON.parse(localStorage.getItem('health-r4')||'[]');
let cY=new Date().getFullYear(),cMo=new Date().getMonth();
let editId=null; // editing record id
const $=id=>document.getElementById(id);
const todS=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const fT=iso=>new Date(iso).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
const fDT=d=>{const p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`};
const dFrom=v=>{const d=new Date(v);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const pCol=l=>l<=3?'var(--green)':l<=6?'var(--yellow)':l<=8?'var(--orange)':'var(--danger)';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function save(){localStorage.setItem('health-r4',JSON.stringify(R))}
function sN(id){$(id).value=fDT(new Date())}
function showT(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}

const TRIG=['運動中','安静時','食後','ストレス','起床時','寒さ','階段','入浴後'];
const SIDES=['左腕','右腕','両腕','左手','右手'];
const STRS=['弱い','中くらい','強い'];
const NIC=['1回','2回','3回','それ以上'];
const NIE=['すぐ効いた','少し時間かかった','効かなかった'];

function mkCh(cid,items,multi,presel){
  const c=$(cid);c.innerHTML='';const st=new Set(presel||[]);
  items.forEach(item=>{
    const b=document.createElement('button');b.className='ch'+(st.has(item)?' on':'');b.textContent=item;
    b.onclick=()=>{if(multi){st.has(item)?st.delete(item):st.add(item)}else{st.clear();st.add(item)}
    c.querySelectorAll('.ch').forEach(x=>x.classList.toggle('on',st.has(x.textContent)))};
    c.appendChild(b);
  });
  c._v=()=>[...st];
}

const svH2=s=>`<svg width="${s}" height="${s}" viewBox="0 0 48 48"><path d="M24 42s-18-10.2-18-22.8C6 12.36 11.16 8 17.4 8c3.78 0 5.94 2.16 6.6 3.12C24.66 10.16 26.82 8 30.6 8 36.84 8 42 12.36 42 19.2 42 31.8 24 42 24 42z" fill="#E8475F"/></svg>`;
const svN2=s=>`<svg width="${s}" height="${s}" viewBox="0 0 40 40" fill="none"><path d="M20 4c-2 0-4 1-5 3l-7 14c-1 2 .5 4 2.5 4h3v8c0 2 1.5 3 3 3h7c1.5 0 3-1 3-3v-8h3c2 0 3.5-2 2.5-4L25 7c-1-2-3-3-5-3z" fill="#A78BFA" opacity=".9"/></svg>`;
const svNi2=s=>`<svg width="${s}" height="${s}" viewBox="0 0 40 40" fill="none"><rect x="14" y="4" width="12" height="20" rx="3" fill="#2DD4BF"/><path d="M17 24v6c0 3 2.5 6 3 6s3-3 3-6v-6" fill="#2DD4BF"/></svg>`;
const tIc=(t,s=22)=>({heart:svH2,numb:svN2,nitro:svNi2})[t](s);
const tCl={heart:'var(--red)',numb:'var(--purple)',nitro:'var(--teal)'};
const tNm={heart:'胸の痛み',numb:'腕のしびれ',nitro:'ニトロ'};

// Tabs
function sTab(t){
  $('tHome').style.display=t==='home'?'':'none';
  $('tCal').style.display=t==='cal'?'':'none';
  $('tBk').style.display=t==='bk'?'':'none';
  $('n1').classList.toggle('on',t==='home');
  $('n2').classList.toggle('on',t==='cal');
  $('n3').classList.toggle('on',t==='bk');
  if(t==='cal')rCal();if(t==='home')rHome();
}

// Modal open
const mIds={heart:'mH',numb:'mN',nitro:'mNi'};
function openM(t,rec){
  editId=rec?rec.id:null;
  if(t==='heart'){
    $('mHT').textContent=rec?'痛みを編集':'胸の痛みを記録';
    $('hOk').textContent=rec?'更新する':'記録する';
    $('pS').value=rec?rec.level:5;uP();
    $('hDur').value=rec&&rec.duration?rec.duration:'';
    $('hMe').value=rec&&rec.memo?rec.memo:'';
    mkCh('hTr',TRIG,true,rec?rec.triggers:[]);
    $(rec?'hDT':'hDT').value=rec?fDT(new Date(rec.time)):fDT(new Date());
  }
  if(t==='numb'){
    $('mNT').textContent=rec?'しびれを編集':'腕のしびれを記録';
    mkCh('nSd',SIDES,false,rec?rec.side:[]);
    mkCh('nSt',STRS,false,rec?rec.strength:[]);
    $('nMe').value=rec&&rec.memo?rec.memo:'';
    $('nDT').value=rec?fDT(new Date(rec.time)):fDT(new Date());
  }
  if(t==='nitro'){
    $('mNiT').textContent=rec?'ニトロを編集':'ニトロ使用を記録';
    mkCh('niC',NIC,false,rec?rec.count:[]);
    mkCh('niE',NIE,false,rec?rec.effect:[]);
    $('niMe').value=rec&&rec.memo?rec.memo:'';
    $('niDT').value=rec?fDT(new Date(rec.time)):fDT(new Date());
  }
  $(mIds[t]).classList.add('show');
}
function closeM(t){$(mIds[t]).classList.remove('show');editId=null}

function uP(){
  const v=+$('pS').value,c=pCol(v);
  $('pN').textContent=v;$('pN').style.color=c;
  $('pHI').setAttribute('fill',c);$('pS').style.accentColor=c;$('hOk').style.background=c;
}

function svH(){
  const dt=$('hDT').value;if(!dt)return;const d=new Date(dt);
  const obj={id:editId||uid(),type:'heart',level:+$('pS').value,duration:$('hDur').value?+$('hDur').value:null,triggers:$('hTr')._v(),memo:$('hMe').value.trim(),time:d.toISOString(),date:dFrom(dt)};
  if(editId){const i=R.findIndex(r=>r.id===editId);if(i>=0)R[i]=obj}else R.push(obj);
  save();closeM('heart');rHome();showT(editId?'更新しました':'胸の痛みを記録 ❤️');
}
function svN(){
  const dt=$('nDT').value;if(!dt)return;const d=new Date(dt);
  const obj={id:editId||uid(),type:'numb',side:$('nSd')._v(),strength:$('nSt')._v(),memo:$('nMe').value.trim(),time:d.toISOString(),date:dFrom(dt)};
  if(editId){const i=R.findIndex(r=>r.id===editId);if(i>=0)R[i]=obj}else R.push(obj);
  save();closeM('numb');rHome();showT(editId?'更新しました':'しびれを記録 🖐');
}
function svNi(){
  const dt=$('niDT').value;if(!dt)return;const d=new Date(dt);
  const obj={id:editId||uid(),type:'nitro',count:$('niC')._v(),effect:$('niE')._v(),memo:$('niMe').value.trim(),time:d.toISOString(),date:dFrom(dt)};
  if(editId){const i=R.findIndex(r=>r.id===editId);if(i>=0)R[i]=obj}else R.push(obj);
  save();closeM('nitro');rHome();showT(editId?'更新しました':'ニトロを記録 💚');
}

function metaS(r){
  const p=[];
  if(r.type==='heart'){p.push('Lv.'+r.level);if(r.duration)p.push(r.duration+'分');if(r.triggers&&r.triggers.length)p.push(r.triggers.join('・'))}
  if(r.type==='numb'){if(r.side&&r.side.length)p.push(r.side.join('・'));if(r.strength&&r.strength.length)p.push(r.strength.join(''))}
  if(r.type==='nitro'){if(r.count&&r.count.length)p.push(r.count.join(''));if(r.effect&&r.effect.length)p.push(r.effect.join(''))}
  if(r.memo)p.push(r.memo);
  return p.join(' / ');
}

function rHome(){
  const t=todS(),tR=R.filter(r=>r.date===t).sort((a,b)=>new Date(b.time)-new Date(a.time));
  let h='';
  if(!tR.length)h='<p class="empty">まだ記録がありません</p>';
  else tR.forEach(r=>{const m=metaS(r);
    h+=`<div class="li" onclick="editRec('${r.id}')"><div class="ic">${tIc(r.type)}</div><div class="bd"><span class="nm" style="color:${tCl[r.type]}">${tNm[r.type]}</span>${m?`<span class="mt">${m}</span>`:''}</div><span class="tm">${fT(r.time)}</span><span class="ed">✎</span></div>`;
  });
  $('todLog').innerHTML=h;

  if(R.length){
    const c=t=>R.filter(r=>r.type===t).length;
    $('totSt').innerHTML=`<div class="sts">
      <div style="text-align:center"><div class="sn" style="color:var(--red)">${c('heart')}</div><div class="sl">痛み</div></div><div class="sd"></div>
      <div style="text-align:center"><div class="sn" style="color:var(--purple)">${c('numb')}</div><div class="sl">しびれ</div></div><div class="sd"></div>
      <div style="text-align:center"><div class="sn" style="color:var(--teal)">${c('nitro')}</div><div class="sl">ニトロ</div></div>
    </div>`;
  }else $('totSt').innerHTML='';
}

function editRec(id){
  const r=R.find(x=>x.id===id);if(!r)return;
  openM(r.type,r);
}

// Calendar
function rCal(){
  $('cT').textContent=`${cY}年 ${cMo+1}月`;
  const days=new Date(cY,cMo+1,0).getDate(),s=new Date(cY,cMo,1).getDay(),t=todS();
  let h='';for(let i=0;i<s;i++)h+='<div></div>';
  for(let d=1;d<=days;d++){
    const ds=`${cY}-${String(cMo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dr=R.filter(r=>r.date===ds),ts=new Set(dr.map(r=>r.type));
    const cls=['cc'];if(dr.length)cls.push('has');if(ds===t)cls.push('tod');
    let dots='';
    if(ts.has('heart'))dots+=`<div class="dot" style="background:var(--red)"></div>`;
    if(ts.has('numb'))dots+=`<div class="dot" style="background:var(--purple)"></div>`;
    if(ts.has('nitro'))dots+=`<div class="dot" style="background:var(--teal)"></div>`;
    h+=`<button class="${cls.join(' ')}" onclick="openDD('${ds}')"><span class="d">${d}</span><div class="dots">${dots}</div>${dr.length?'<span class="cnt">'+dr.length+'</span>':''}</button>`;
  }
  $('cG').innerHTML=h;
  const mk=`${cY}-${String(cMo+1).padStart(2,'0')}`,mr=R.filter(r=>r.date.startsWith(mk));
  const cnt=t=>mr.filter(r=>r.type===t).length;
  $('cS').innerHTML=`
    <div style="text-align:center"><div class="sn" style="color:var(--red)">${cnt('heart')}</div><div class="sl">痛み</div></div>
    <div style="text-align:center"><div class="sn" style="color:var(--purple)">${cnt('numb')}</div><div class="sl">しびれ</div></div>
    <div style="text-align:center"><div class="sn" style="color:var(--teal)">${cnt('nitro')}</div><div class="sl">ニトロ</div></div>`;
}
function pMo(){if(cMo===0){cMo=11;cY--}else cMo--;rCal()}
function nMo(){if(cMo===11){cMo=0;cY++}else cMo++;rCal()}

// Day detail
function openDD(ds){
  const p=ds.split('-');$('ddT').textContent=`${+p[1]}月${+p[2]}日の記録`;
  const dr=R.filter(r=>r.date===ds).sort((a,b)=>new Date(a.time)-new Date(b.time));
  let h='';
  if(!dr.length)h='<p class="empty">記録なし</p>';
  else dr.forEach(r=>{const m=metaS(r);
    h+=`<div class="di2" onclick="editFromDD('${r.id}')"><div class="ic">${tIc(r.type,24)}</div><div class="inf"><span class="nm2" style="color:${tCl[r.type]}">${tNm[r.type]}</span><span class="tm2">${fT(r.time)}</span>${m?`<div class="ex">${m}</div>`:''}</div><button class="db" onclick="event.stopPropagation();delR('${r.id}','${ds}')">🗑</button></div>`;
  });
  $('ddL').innerHTML=h;$('dayD').classList.add('show');
}
function closeDD(){$('dayD').classList.remove('show')}
function editFromDD(id){closeDD();setTimeout(()=>editRec(id),200)}
function delR(id,ds){R=R.filter(r=>r.id!==id);save();openDD(ds);rHome();showT('削除しました')}

// Backup: CSV
function dlCSV(){
  if(!R.length){showT('データがありません');return}
  let csv='\ufeff日付,時刻,種類,レベル,持続時間(分),きっかけ,部位,強さ,回数,効果,メモ\n';
  R.sort((a,b)=>new Date(a.time)-new Date(b.time)).forEach(r=>{
    const d=new Date(r.time);
    const date=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    const time=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const esc=s=>`"${(s||'').replace(/"/g,'""')}"`;
    csv+=`${date},${time},${tNm[r.type]||''},${r.level||''},${r.duration||''},${esc((r.triggers||[]).join('・'))},${esc((r.side||[]).join('・'))},${esc((r.strength||[]).join(''))},${esc((r.count||[]).join(''))},${esc((r.effect||[]).join(''))},${esc(r.memo)}\n`;
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`health-log-${todS()}.csv`;a.click();
  showT('CSVをダウンロードしました 📊');
}

// Backup: JSON copy
function cpJSON(){
  if(!R.length){showT('データがありません');return}
  const j=JSON.stringify(R,null,2);
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(j).then(()=>showT('JSONをコピーしました 📋')).catch(()=>fallbackCopy(j));
  }else fallbackCopy(j);
}
function fallbackCopy(t){
  const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showT('JSONをコピーしました 📋')}catch(e){showT('コピーに失敗しました…')}
  document.body.removeChild(ta);
}

// Restore JSON
function restJSON(input){
  const f=input.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data)){showT('無効なデータです');return}
      if(R.length&&!confirm(`現在${R.length}件の記録があります。\n復元すると上書きされます。\nよろしいですか？`)){input.value='';return}
      R=data;save();rHome();showT(`${R.length}件のデータを復元しました ✅`);
    }catch(err){showT('JSONの読み込みに失敗しました')}
    input.value='';
  };
  reader.readAsText(f);
}

// Init
$('hDate').textContent=new Date().toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'});
rHome();
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0D1A">
<title>♥ ヘルスログ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0D0D1A;--card:#12122240;--card-solid:#1A1A2E;
  --red:#E8475F;--blue:#5B8DEF;--green:#4ADE80;--yellow:#FBBF24;
  --orange:#FB923C;--danger:#EF4444;--purple:#A78BFA;--teal:#2DD4BF;
  --text:#fff;--muted:#888;--dim:#555;
  --jp:'Noto Sans JP',sans-serif;--num:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--jp);max-width:420px;margin:0 auto;min-height:100vh;min-height:100dvh;overflow-x:hidden;padding-bottom:80px}
button{font-family:var(--jp);cursor:pointer;border:none;background:none}
input[type=range]{width:100%;height:6px}
input[type=datetime-local],input[type=number],textarea,select{font-family:var(--jp)}

.header{padding:20px 20px 12px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
.header .date{color:var(--muted);font-size:12px;font-family:var(--num)}

.action-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:16px 20px}
.act-btn{border-radius:20px;padding:18px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:transform .12s;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.act-btn:active{transform:scale(.93)}
.act-btn .lbl{font-size:13px;font-weight:700}
.act-btn .sub{color:#666;font-size:9px}
.act-heart{background:linear-gradient(145deg,#2A1525,#1A1A2E);box-shadow:0 0 30px rgba(232,71,95,.1),inset 0 1px 0 rgba(255,255,255,.04)}
.act-pill{background:linear-gradient(145deg,#152035,#1A1A2E);box-shadow:0 0 30px rgba(91,141,239,.1),inset 0 1px 0 rgba(255,255,255,.04)}
.act-numb{background:linear-gradient(145deg,#1A1530,#1A1A2E);box-shadow:0 0 30px rgba(167,139,250,.1),inset 0 1px 0 rgba(255,255,255,.04)}
.act-nitro{background:linear-gradient(145deg,#152525,#1A1A2E);box-shadow:0 0 30px rgba(45,212,191,.1),inset 0 1px 0 rgba(255,255,255,.04)}

.section-title{font-size:14px;font-weight:700;color:#aaa;margin:16px 20px 10px}
.log-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--card);border-radius:14px;margin:0 20px 5px}
.log-item .icon{width:28px;display:flex;justify-content:center;flex-shrink:0}
.log-item .body{flex:1;min-width:0}
.log-item .name{font-size:13px;font-weight:600;display:block}
.log-item .meta{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.log-item .time{color:var(--muted);font-size:12px;font-family:var(--num);flex-shrink:0}
.empty{color:var(--dim);font-size:13px;text-align:center;padding:24px}

.stats{margin:16px 20px 0;padding:14px;background:var(--card);border-radius:18px;display:flex;justify-content:space-around}
.stat-num{font-size:24px;font-weight:800;font-family:var(--num)}
.stat-label{font-size:9px;color:var(--muted)}
.stat-div{width:1px;background:#222}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:#0D0D1AEE;border-top:1px solid #1A1A2E;display:flex;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:50}
.nav-btn{flex:1;padding:12px 0 10px;display:flex;flex-direction:column;align-items:center;gap:2px;opacity:.4;transition:opacity .2s}
.nav-btn.active{opacity:1}
.nav-btn .ico{font-size:20px}
.nav-btn .nlbl{font-size:10px;color:#fff;font-weight:600}

.cal-nav{display:flex;align-items:center;justify-content:space-between;margin:16px 20px 14px}
.cal-nav button{color:#aaa;font-size:24px;padding:4px 14px}
.cal-nav .month{font-size:17px;font-weight:700;font-family:var(--num)}
.cal-wd{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin:0 16px 6px}
.cal-wd span{text-align:center;font-size:11px;color:#777;padding:6px 0}
.cal-wd span:first-child{color:var(--red)}.cal-wd span:last-child{color:var(--blue)}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin:0 16px}
.cc{aspect-ratio:1;border-radius:12px;border:1px solid #222;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:2px}
.cc.has{background:#1E1E3A}.cc.today{border:2px solid var(--blue)}
.cc .d{font-size:13px;font-family:var(--num);color:#ccc}
.cc.today .d{color:var(--blue);font-weight:700}
.cc .dots{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center}
.cc .dot{width:5px;height:5px;border-radius:50%}
.cc .cnt{position:absolute;top:1px;right:3px;font-size:8px;color:#888;font-family:var(--num)}
.cal-sum{margin:18px 16px;padding:14px;background:var(--card);border-radius:16px;display:flex;justify-content:space-around}
.cal-sum .stat-num{font-size:20px}

.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.ov.bottom{align-items:flex-end}
.ov.show{display:flex}
.md{background:var(--card-solid);border-radius:24px;padding:24px 22px;width:min(90vw,360px);box-shadow:0 20px 60px rgba(0,0,0,.5);animation:sUp .25s ease-out;max-height:85vh;overflow-y:auto}
.md.sheet{border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-width:420px;max-height:75vh}
@keyframes sUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.md-title{color:#fff;font-size:15px;font-weight:600;text-align:center;margin-bottom:12px}

.field{margin:12px 0}
.field-label{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:500}
.dt-row{display:flex;gap:8px;align-items:center}
.dt-input{flex:1;background:#0D0D1A;border:1px solid #333;border-radius:10px;color:#fff;padding:10px 12px;font-size:14px;font-family:var(--num);-webkit-appearance:none}
.dt-input:focus{outline:none;border-color:var(--blue)}
.btn-now{padding:10px 14px;border-radius:10px;background:#222;color:#aaa;font-size:11px;font-weight:600;white-space:nowrap}
.btn-now:active{background:#333}

.pain-disp{display:flex;align-items:center;justify-content:center;gap:4px;margin:12px 0}
.pain-n{font-size:42px;font-weight:800;font-family:var(--num);line-height:1}
.pain-max{color:#888;font-size:14px;align-self:flex-end;margin-bottom:6px}
.pain-ends{display:flex;justify-content:space-between;color:#666;font-size:11px;margin:4px 2px 0}

.chip-group{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;background:#222;color:#aaa;transition:all .15s}
.chip.on{background:var(--blue);color:#fff}
.chip:active{transform:scale(.95)}

textarea.memo{width:100%;background:#0D0D1A;border:1px solid #333;border-radius:10px;color:#fff;padding:10px 12px;font-size:13px;resize:none;min-height:60px;font-family:var(--jp)}
textarea.memo:focus{outline:none;border-color:var(--blue)}
input.num-input{width:80px;background:#0D0D1A;border:1px solid #333;border-radius:10px;color:#fff;padding:10px 12px;font-size:14px;font-family:var(--num);text-align:center}
input.num-input:focus{outline:none;border-color:var(--blue)}

.md-btns{display:flex;gap:10px;margin-top:18px}
.md-btns button{flex:1;padding:12px 0;border-radius:14px;font-size:14px;font-weight:600}
.btn-c{border:1px solid #333!important;color:#aaa}
.btn-ok{color:#fff;font-weight:700!important}

.det-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.det-h span{font-size:18px;font-weight:700}
.det-h button{color:#888;font-size:22px}
.det-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--card);border-radius:14px;margin-bottom:8px}
.det-item .icon{width:28px;display:flex;justify-content:center;flex-shrink:0;padding-top:2px}
.det-item .info{flex:1;min-width:0}
.det-item .info .nm{color:#fff;font-size:14px;font-weight:600}
.det-item .info .tm{color:var(--muted);font-size:12px;margin-left:8px;font-family:var(--num)}
.det-item .info .extra{font-size:11px;color:#999;margin-top:3px;line-height:1.4}
.del-btn{color:#555;font-size:16px;padding:4px 8px;flex-shrink:0}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#2A2A4A;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <div><h1><span style="color:var(--red)">♥</span> ヘルスログ</h1><p style="margin-top:2px;color:#666;font-size:11px">狭心症の記録</p></div>
  <div class="date" id="hDate"></div>
</div>

<div id="tabHome">
  <div class="action-grid">
    <button class="act-btn act-heart" onclick="openM('heart')">
      <svg width="44" height="44" viewBox="0 0 48 48"><path d="M24 42s-18-10.2-18-22.8C6 12.36 11.16 8 17.4 8c3.78 0 5.94 2.16 6.6 3.12C24.66 10.16 26.82 8 30.6 8 36.84 8 42 12.36 42 19.2 42 31.8 24 42 24 42z" fill="#E8475F"/></svg>
      <span class="lbl" style="color:var(--red)">胸の痛み</span><span class="sub">レベル・持続時間</span>
    </button>
    <button class="act-btn act-pill" onclick="openM('pill')">
      <svg width="40" height="40" viewBox="0 0 44 44"><rect x="6" y="18" width="32" height="10" rx="5" fill="#5B8DEF" transform="rotate(-30 22 22)"/><rect x="6" y="18" width="16" height="10" rx="5" fill="#3A6BD4" transform="rotate(-30 22 22)"/></svg>
      <span class="lbl" style="color:var(--blue)">服薬</span><span class="sub">薬の記録</span>
    </button>
    <button class="act-btn act-numb" onclick="openM('numb')">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><path d="M20 4c-2 0-4 1-5 3l-7 14c-1 2 .5 4 2.5 4h3v8c0 2 1.5 3 3 3h7c1.5 0 3-1 3-3v-8h3c2 0 3.5-2 2.5-4L25 7c-1-2-3-3-5-3z" fill="#A78BFA" opacity=".9"/><path d="M16 18h8M16 22h6" stroke="#1A1A2E" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="lbl" style="color:var(--purple)">腕のしびれ</span><span class="sub">左右・強さ</span>
    </button>
    <button class="act-btn act-nitro" onclick="openM('nitro')">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><rect x="14" y="4" width="12" height="20" rx="3" fill="#2DD4BF"/><rect x="16" y="8" width="8" height="6" rx="1" fill="#1A1A2E" opacity=".3"/><path d="M17 24v6c0 3 2.5 6 3 6s3-3 3-6v-6" fill="#2DD4BF"/></svg>
      <span class="lbl" style="color:var(--teal)">ニトロ</span><span class="sub">舌下錠の使用</span>
    </button>
  </div>
  <div class="section-title">今日の記録</div>
  <div id="todayLog"></div>
  <div id="totalStats"></div>
</div>

<div id="tabCal" style="display:none">
  <div class="cal-nav"><button onclick="pMo()">‹</button><span class="month" id="cT"></span><button onclick="nMo()">›</button></div>
  <div class="cal-wd"><span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span></div>
  <div class="cal-g" id="cG"></div>
  <div class="cal-sum" id="cS"></div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nH" onclick="sTab('home')"><span class="ico">🏠</span><span class="nlbl">ホーム</span></button>
  <button class="nav-btn" id="nC" onclick="sTab('calendar')"><span class="ico">📅</span><span class="nlbl">カレンダー</span></button>
</div>

<!-- HEART MODAL -->
<div class="ov" id="mHeart" onclick="closeM('heart')">
<div class="md" onclick="event.stopPropagation()">
  <p class="md-title">胸の痛みを記録</p>
  <div class="pain-disp">
    <svg width="30" height="30" viewBox="0 0 48 48"><path d="M24 42s-18-10.2-18-22.8C6 12.36 11.16 8 17.4 8c3.78 0 5.94 2.16 6.6 3.12C24.66 10.16 26.82 8 30.6 8 36.84 8 42 12.36 42 19.2 42 31.8 24 42 24 42z" fill="#E8475F" id="pHI"/></svg>
    <span class="pain-n" id="pN">5</span><span class="pain-max">/10</span>
  </div>
  <input type="range" min="1" max="10" value="5" id="pS" oninput="uPain()" style="accent-color:var(--yellow)">
  <div class="pain-ends"><span>軽い</span><span>激しい</span></div>
  <div class="field"><div class="field-label">持続時間（分）</div><input type="number" class="num-input" id="hDur" value="" placeholder="—" min="0"></div>
  <div class="field"><div class="field-label">きっかけ（複数選択OK）</div><div class="chip-group" id="hTrig"></div></div>
  <div class="field"><div class="field-label">メモ</div><textarea class="memo" id="hMemo" placeholder="状況など自由に…" rows="2"></textarea></div>
  <div class="field"><div class="field-label">日時</div><div class="dt-row"><input type="datetime-local" class="dt-input" id="hDT"><button class="btn-now" onclick="setNow('hDT')">現在</button></div></div>
  <div class="md-btns"><button class="btn-c" onclick="closeM('heart')">キャンセル</button><button class="btn-ok" id="hOk" onclick="saveHeart()">記録する</button></div>
</div></div>

<!-- PILL MODAL -->
<div class="ov" id="mPill" onclick="closeM('pill')">
<div class="md" onclick="event.stopPropagation()">
  <p class="md-title">服薬を記録</p>
  <div style="text-align:center;margin:10px 0"><svg width="48" height="48" viewBox="0 0 44 44"><rect x="6" y="18" width="32" height="10" rx="5" fill="#5B8DEF" transform="rotate(-30 22 22)"/><rect x="6" y="18" width="16" height="10" rx="5" fill="#3A6BD4" transform="rotate(-30 22 22)"/></svg></div>
  <div class="field"><div class="field-label">メモ（薬名など）</div><textarea class="memo" id="piMemo" placeholder="薬の名前や量など…" rows="2"></textarea></div>
  <div class="field"><div class="field-label">日時</div><div class="dt-row"><input type="datetime-local" class="dt-input" id="piDT"><button class="btn-now" onclick="setNow('piDT')">現在</button></div></div>
  <div class="md-btns"><button class="btn-c" onclick="closeM('pill')">キャンセル</button><button class="btn-ok" style="background:var(--blue)" onclick="savePill()">記録する</button></div>
</div></div>

<!-- NUMB MODAL -->
<div class="ov" id="mNumb" onclick="closeM('numb')">
<div class="md" onclick="event.stopPropagation()">
  <p class="md-title">腕のしびれを記録</p>
  <div style="text-align:center;margin:10px 0"><svg width="48" height="48" viewBox="0 0 40 40" fill="none"><path d="M20 4c-2 0-4 1-5 3l-7 14c-1 2 .5 4 2.5 4h3v8c0 2 1.5 3 3 3h7c1.5 0 3-1 3-3v-8h3c2 0 3.5-2 2.5-4L25 7c-1-2-3-3-5-3z" fill="#A78BFA" opacity=".9"/><path d="M16 18h8M16 22h6" stroke="#1A1A2E" stroke-width="1.5" stroke-linecap="round"/></svg></div>
  <div class="field"><div class="field-label">部位</div><div class="chip-group" id="nSide"></div></div>
  <div class="field"><div class="field-label">強さ</div><div class="chip-group" id="nStr"></div></div>
  <div class="field"><div class="field-label">メモ</div><textarea class="memo" id="nMemo" placeholder="気づいたことなど…" rows="2"></textarea></div>
  <div class="field"><div class="field-label">日時</div><div class="dt-row"><input type="datetime-local" class="dt-input" id="nDT"><button class="btn-now" onclick="setNow('nDT')">現在</button></div></div>
  <div class="md-btns"><button class="btn-c" onclick="closeM('numb')">キャンセル</button><button class="btn-ok" style="background:var(--purple)" onclick="saveNumb()">記録する</button></div>
</div></div>

<!-- NITRO MODAL -->
<div class="ov" id="mNitro" onclick="closeM('nitro')">
<div class="md" onclick="event.stopPropagation()">
  <p class="md-title">ニトロ使用を記録</p>
  <div style="text-align:center;margin:10px 0"><svg width="48" height="48" viewBox="0 0 40 40" fill="none"><rect x="14" y="4" width="12" height="20" rx="3" fill="#2DD4BF"/><rect x="16" y="8" width="8" height="6" rx="1" fill="#1A1A2E" opacity=".3"/><path d="M17 24v6c0 3 2.5 6 3 6s3-3 3-6v-6" fill="#2DD4BF"/></svg></div>
  <div class="field"><div class="field-label">使用回数</div><div class="chip-group" id="niCnt"></div></div>
  <div class="field"><div class="field-label">効果</div><div class="chip-group" id="niEff"></div></div>
  <div class="field"><div class="field-label">メモ</div><textarea class="memo" id="niMemo" placeholder="効くまでの時間など…" rows="2"></textarea></div>
  <div class="field"><div class="field-label">日時</div><div class="dt-row"><input type="datetime-local" class="dt-input" id="niDT"><button class="btn-now" onclick="setNow('niDT')">現在</button></div></div>
  <div class="md-btns"><button class="btn-c" onclick="closeM('nitro')">キャンセル</button><button class="btn-ok" style="background:var(--teal)" onclick="saveNitro()">記録する</button></div>
</div></div>

<!-- DAY DETAIL -->
<div class="ov bottom" id="dayDet" onclick="closeDD()">
<div class="md sheet" onclick="event.stopPropagation()">
  <div class="det-h"><span id="ddT"></span><button onclick="closeDD()">✕</button></div>
  <div id="ddL"></div>
</div></div>

<div class="toast" id="toast"></div>

<script>
let R=JSON.parse(localStorage.getItem('health-r3')||'[]');
let cY=new Date().getFullYear(),cMo=new Date().getMonth();
const $=id=>document.getElementById(id);
const todS=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const fT=iso=>new Date(iso).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
const fDT=d=>{const p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`};
const dFrom=v=>{const d=new Date(v);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const pCol=l=>l<=3?'var(--green)':l<=6?'var(--yellow)':l<=8?'var(--orange)':'var(--danger)';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function save(){localStorage.setItem('health-r3',JSON.stringify(R))}
function setNow(id){$(id).value=fDT(new Date())}
function showT(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}

const TRIGGERS=['運動中','安静時','食後','ストレス','起床時','寒さ','階段','入浴後'];
const SIDES=['左腕','右腕','両腕','左手','右手'];
const STRS=['弱い','中くらい','強い'];
const NI_CNT=['1回','2回','3回','それ以上'];
const NI_EFF=['すぐ効いた','少し時間かかった','効かなかった'];

function buildChips(cid,items,multi){
  const c=$(cid);c.innerHTML='';const st=new Set();
  items.forEach(item=>{
    const b=document.createElement('button');b.className='chip';b.textContent=item;
    b.onclick=()=>{if(multi){st.has(item)?st.delete(item):st.add(item)}else{st.clear();st.add(item)}
    c.querySelectorAll('.chip').forEach(ch=>ch.classList.toggle('on',st.has(ch.textContent)))};
    c.appendChild(b);
  });
  c._v=()=>[...st];
}

const svgH=s=>`<svg width="${s}" height="${s}" viewBox="0 0 48 48"><path d="M24 42s-18-10.2-18-22.8C6 12.36 11.16 8 17.4 8c3.78 0 5.94 2.16 6.6 3.12C24.66 10.16 26.82 8 30.6 8 36.84 8 42 12.36 42 19.2 42 31.8 24 42 24 42z" fill="#E8475F"/></svg>`;
const svgP=s=>`<svg width="${s}" height="${s}" viewBox="0 0 44 44"><rect x="6" y="18" width="32" height="10" rx="5" fill="#5B8DEF" transform="rotate(-30 22 22)"/><rect x="6" y="18" width="16" height="10" rx="5" fill="#3A6BD4" transform="rotate(-30 22 22)"/></svg>`;
const svgN=s=>`<svg width="${s}" height="${s}" viewBox="0 0 40 40" fill="none"><path d="M20 4c-2 0-4 1-5 3l-7 14c-1 2 .5 4 2.5 4h3v8c0 2 1.5 3 3 3h7c1.5 0 3-1 3-3v-8h3c2 0 3.5-2 2.5-4L25 7c-1-2-3-3-5-3z" fill="#A78BFA" opacity=".9"/></svg>`;
const svgNi=s=>`<svg width="${s}" height="${s}" viewBox="0 0 40 40" fill="none"><rect x="14" y="4" width="12" height="20" rx="3" fill="#2DD4BF"/><path d="M17 24v6c0 3 2.5 6 3 6s3-3 3-6v-6" fill="#2DD4BF"/></svg>`;
const tIcon=(t,s=24)=>({heart:svgH,pill:svgP,numb:svgN,nitro:svgNi})[t](s);
const tCol={heart:'var(--red)',pill:'var(--blue)',numb:'var(--purple)',nitro:'var(--teal)'};
const tNm={heart:'胸の痛み',pill:'服薬',numb:'腕のしびれ',nitro:'ニトロ'};

function sTab(t){
  $('tabHome').style.display=t==='home'?'':'none';
  $('tabCal').style.display=t==='calendar'?'':'none';
  $('nH').classList.toggle('active',t==='home');
  $('nC').classList.toggle('active',t==='calendar');
  if(t==='calendar')rCal();if(t==='home')rHome();
}

const mId={heart:'mHeart',pill:'mPill',numb:'mNumb',nitro:'mNitro'};
function openM(t){
  if(t==='heart'){setNow('hDT');$('pS').value=5;uPain();$('hDur').value='';$('hMemo').value='';buildChips('hTrig',TRIGGERS,true)}
  if(t==='pill'){setNow('piDT');$('piMemo').value=''}
  if(t==='numb'){setNow('nDT');$('nMemo').value='';buildChips('nSide',SIDES,false);buildChips('nStr',STRS,false)}
  if(t==='nitro'){setNow('niDT');$('niMemo').value='';buildChips('niCnt',NI_CNT,false);buildChips('niEff',NI_EFF,false)}
  $(mId[t]).classList.add('show');
}
function closeM(t){$(mId[t]).classList.remove('show')}

function uPain(){
  const v=+$('pS').value,c=pCol(v);
  $('pN').textContent=v;$('pN').style.color=c;
  $('pHI').setAttribute('fill',c);$('pS').style.accentColor=c;$('hOk').style.background=c;
}

function saveHeart(){
  const dt=$('hDT').value;if(!dt)return;const d=new Date(dt);
  R.push({id:uid(),type:'heart',level:+$('pS').value,duration:$('hDur').value?+$('hDur').value:null,triggers:$('hTrig')._v(),memo:$('hMemo').value.trim(),time:d.toISOString(),date:dFrom(dt)});
  save();closeM('heart');rHome();showT('胸の痛みを記録 ❤️');
}
function savePill(){
  const dt=$('piDT').value;if(!dt)return;const d=new Date(dt);
  R.push({id:uid(),type:'pill',memo:$('piMemo').value.trim(),time:d.toISOString(),date:dFrom(dt)});
  save();closeM('pill');rHome();showT('服薬を記録 💊');
}
function saveNumb(){
  const dt=$('nDT').value;if(!dt)return;const d=new Date(dt);
  R.push({id:uid(),type:'numb',side:$('nSide')._v(),strength:$('nStr')._v(),memo:$('nMemo').value.trim(),time:d.toISOString(),date:dFrom(dt)});
  save();closeM('numb');rHome();showT('しびれを記録 🖐');
}
function saveNitro(){
  const dt=$('niDT').value;if(!dt)return;const d=new Date(dt);
  R.push({id:uid(),type:'nitro',count:$('niCnt')._v(),effect:$('niEff')._v(),memo:$('niMemo').value.trim(),time:d.toISOString(),date:dFrom(dt)});
  save();closeM('nitro');rHome();showT('ニトロを記録 💚');
}

function metaStr(r){
  const p=[];
  if(r.type==='heart'){p.push('Lv.'+r.level);if(r.duration)p.push(r.duration+'分');if(r.triggers&&r.triggers.length)p.push(r.triggers.join('・'))}
  if(r.type==='numb'){if(r.side&&r.side.length)p.push(r.side.join('・'));if(r.strength&&r.strength.length)p.push(r.strength.join(''))}
  if(r.type==='nitro'){if(r.count&&r.count.length)p.push(r.count.join(''));if(r.effect&&r.effect.length)p.push(r.effect.join(''))}
  if(r.memo)p.push(r.memo);
  return p.join(' / ');
}

function rHome(){
  const t=todS(),tR=R.filter(r=>r.date===t).sort((a,b)=>new Date(b.time)-new Date(a.time));
  let h='';
  if(!tR.length)h='<p class="empty">まだ記録がありません</p>';
  else tR.forEach(r=>{const m=metaStr(r);
    h+=`<div class="log-item"><div class="icon">${tIcon(r.type)}</div><div class="body"><span class="name" style="color:${tCol[r.type]}">${tNm[r.type]}</span>${m?`<span class="meta">${m}</span>`:''}</div><span class="time">${fT(r.time)}</span></div>`;
  });
  $('todayLog').innerHTML=h;

  if(R.length){
    const c=(t)=>R.filter(r=>r.type===t).length;
    $('totalStats').innerHTML=`<div class="stats">
      <div style="text-align:center"><div class="stat-num" style="color:var(--red)">${c('heart')}</div><div class="stat-label">痛み</div></div><div class="stat-div"></div>
      <div style="text-align:center"><div class="stat-num" style="color:var(--blue)">${c('pill')}</div><div class="stat-label">服薬</div></div><div class="stat-div"></div>
      <div style="text-align:center"><div class="stat-num" style="color:var(--purple)">${c('numb')}</div><div class="stat-label">しびれ</div></div><div class="stat-div"></div>
      <div style="text-align:center"><div class="stat-num" style="color:var(--teal)">${c('nitro')}</div><div class="stat-label">ニトロ</div></div>
    </div>`;
  }else $('totalStats').innerHTML='';
}

function rCal(){
  $('cT').textContent=`${cY}年 ${cMo+1}月`;
  const days=new Date(cY,cMo+1,0).getDate(),s=new Date(cY,cMo,1).getDay(),t=todS();
  let h='';for(let i=0;i<s;i++)h+='<div></div>';
  for(let d=1;d<=days;d++){
    const ds=`${cY}-${String(cMo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dr=R.filter(r=>r.date===ds),ts=new Set(dr.map(r=>r.type));
    const cls=['cc'];if(dr.length)cls.push('has');if(ds===t)cls.push('today');
    let dots='';
    if(ts.has('heart'))dots+=`<div class="dot" style="background:var(--red)"></div>`;
    if(ts.has('pill'))dots+=`<div class="dot" style="background:var(--blue)"></div>`;
    if(ts.has('numb'))dots+=`<div class="dot" style="background:var(--purple)"></div>`;
    if(ts.has('nitro'))dots+=`<div class="dot" style="background:var(--teal)"></div>`;
    h+=`<button class="${cls.join(' ')}" onclick="openDD('${ds}')"><span class="d">${d}</span><div class="dots">${dots}</div>${dr.length?'<span class="cnt">'+dr.length+'</span>':''}</button>`;
  }
  $('cG').innerHTML=h;
  const mk=`${cY}-${String(cMo+1).padStart(2,'0')}`,mr=R.filter(r=>r.date.startsWith(mk));
  const cnt=t=>mr.filter(r=>r.type===t).length;
  $('cS').innerHTML=`
    <div style="text-align:center"><div class="stat-num" style="color:var(--red)">${cnt('heart')}</div><div class="stat-label">痛み</div></div>
    <div style="text-align:center"><div class="stat-num" style="color:var(--blue)">${cnt('pill')}</div><div class="stat-label">服薬</div></div>
    <div style="text-align:center"><div class="stat-num" style="color:var(--purple)">${cnt('numb')}</div><div class="stat-label">しびれ</div></div>
    <div style="text-align:center"><div class="stat-num" style="color:var(--teal)">${cnt('nitro')}</div><div class="stat-label">ニトロ</div></div>`;
}
function pMo(){if(cMo===0){cMo=11;cY--}else cMo--;rCal()}
function nMo(){if(cMo===11){cMo=0;cY++}else cMo++;rCal()}

function openDD(ds){
  const p=ds.split('-');$('ddT').textContent=`${+p[1]}月${+p[2]}日の記録`;
  const dr=R.filter(r=>r.date===ds).sort((a,b)=>new Date(a.time)-new Date(b.time));
  let h='';
  if(!dr.length)h='<p class="empty">記録なし</p>';
  else dr.forEach(r=>{const m=metaStr(r);
    h+=`<div class="det-item"><div class="icon">${tIcon(r.type,26)}</div><div class="info"><span class="nm" style="color:${tCol[r.type]}">${tNm[r.type]}</span><span class="tm">${fT(r.time)}</span>${m?`<div class="extra">${m}</div>`:''}</div><button class="del-btn" onclick="delR('${r.id}','${ds}')">🗑</button></div>`;
  });
  $('ddL').innerHTML=h;$('dayDet').classList.add('show');
}
function closeDD(){$('dayDet').classList.remove('show')}
function delR(id,ds){R=R.filter(r=>r.id!==id);save();openDD(ds);rHome();showT('削除しました')}

$('hDate').textContent=new Date().toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'});
rHome();
</script>
</body>
</html>
